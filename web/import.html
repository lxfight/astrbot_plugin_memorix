<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A_Memorix 导入中心</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #151d33;
        --panel2: #0f1730;
        --line: #2a375b;
        --text: #edf2ff;
        --muted: #9fb0d6;
        --primary: #4ea1ff;
        --secondary: #2f4f85;
        --danger: #ff6b6b;
        --ok: #55c27d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(1200px 700px at 20% -10%, #243b73 0%, var(--bg) 55%);
        color: var(--text);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 12, 24, 0.75);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .topbar h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }

      .topbar .right {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .container {
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 14px;
        padding: 14px;
        min-height: calc(100vh - 60px);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: linear-gradient(180deg, var(--panel), var(--panel2));
        padding: 12px;
      }

      .panel h2 {
        margin: 0 0 10px 0;
        font-size: 14px;
        font-weight: 700;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 10px;
        background: rgba(11, 17, 35, 0.75);
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }

      .row:last-child {
        margin-bottom: 0;
      }

      label {
        font-size: 12px;
        color: var(--muted);
        min-width: 74px;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 9px;
        background: #0b1329;
        color: var(--text);
      }

      textarea {
        min-height: 90px;
        resize: vertical;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 10px;
        background: linear-gradient(180deg, #314f82, #253f6b);
        color: var(--text);
        cursor: pointer;
        transition: transform 0.12s ease, filter 0.12s ease;
      }

      button:hover {
        filter: brightness(1.06);
      }

      button:active {
        transform: translateY(1px);
      }

      button.btn-primary {
        background: linear-gradient(180deg, #68b8ff, var(--primary));
        border-color: #4d96e6;
        color: #061226;
        font-weight: 600;
      }

      button.btn-secondary {
        background: linear-gradient(180deg, #41659d, var(--secondary));
        border-color: #3e5f92;
      }

      button.btn-danger {
        background: linear-gradient(180deg, #ff7f7f, var(--danger));
        border-color: #e05a5a;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .muted {
        color: var(--muted);
        font-size: 12px;
      }

      .task-list {
        max-height: 240px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .task-item {
        border-bottom: 1px solid var(--line);
        padding: 8px;
        cursor: pointer;
      }

      .task-item:last-child {
        border-bottom: none;
      }

      .task-item.active {
        background: rgba(78, 161, 255, 0.16);
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      .status-ok {
        color: var(--ok);
      }

      .status-bad {
        color: var(--danger);
      }

      .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .table {
        width: 100%;
        border-collapse: collapse;
      }

      .table th,
      .table td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: 6px;
        font-size: 12px;
      }

      .file-picker {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .file-picker-name {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .guide-modal {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 15, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 30;
      }

      .guide-modal.show {
        display: flex;
      }

      .guide-panel {
        width: min(920px, 92vw);
        max-height: 82vh;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: linear-gradient(180deg, var(--panel), var(--panel2));
        display: flex;
        flex-direction: column;
      }

      .guide-head {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .guide-head h3 {
        margin: 0;
        font-size: 14px;
      }

      .guide-content {
        margin: 0;
        padding: 12px;
        white-space: pre-wrap;
        overflow: auto;
        font-size: 12px;
        line-height: 1.55;
      }

      @media (max-width: 980px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>导入中心</h1>
      <div class="right">
        <a href="/" class="muted">返回图谱页</a>
      </div>
    </div>

    <div class="container">
      <div class="panel">
        <h2>鉴权（可选）</h2>
        <div class="card">
          <div class="row">
            <label>Bearer</label>
            <input id="token-input" type="password" placeholder="如需鉴权，请填 token" />
          </div>
          <div class="row">
            <button class="btn-secondary" onclick="saveToken()">保存 token</button>
            <button class="btn-secondary" onclick="clearToken()">清除 token</button>
          </div>
        </div>

        <h2>导入功能说明</h2>
        <div class="card">
          <div class="muted">
            当前页面仅支持 3 类导入：上传文件、粘贴文本、原始目录扫描。
          </div>
          <div class="muted">支持文件后缀：`.txt`、`.md`、`.json`。</div>
          <div class="muted">可手动设置 `knowledge_type`：auto / factual / narrative / structured / mixed。</div>
          <div class="muted">任务支持任务级、文件级、分块级状态观察，支持取消与失败重试。</div>
          <div class="row" style="margin-top: 8px">
            <button class="btn-secondary" onclick="openImportGuide()">查看导入指南</button>
          </div>
        </div>

        <h2>上传文件导入</h2>
        <div class="card">
          <div class="row">
            <label>文件</label>
            <div class="file-picker">
              <button class="btn-secondary" type="button" onclick="triggerUploadFiles()">选择文件</button>
              <span id="upload-files-label" class="file-picker-name">未选择文件</span>
              <input id="upload-files" type="file" multiple style="display: none" onchange="updateUploadFilesLabel()" />
            </div>
          </div>
          <div class="row">
            <label>模式</label>
            <select id="upload-mode">
              <option value="text">text</option>
              <option value="json">json</option>
            </select>
          </div>
          <div class="row">
            <label>知识类型</label>
            <select id="upload-knowledge-type">
              <option value="auto">auto(自动识别)</option>
              <option value="factual">factual</option>
              <option value="narrative">narrative</option>
              <option value="structured">structured</option>
              <option value="mixed">mixed</option>
            </select>
          </div>
          <div class="row">
            <button class="btn-primary" onclick="createUploadTask()">创建任务</button>
          </div>
        </div>

        <h2>粘贴文本导入</h2>
        <div class="card">
          <div class="row">
            <label>名称</label>
            <input id="paste-name" value="paste_input.txt" />
          </div>
          <div class="row">
            <label>内容</label>
            <textarea id="paste-content" placeholder="输入文本内容"></textarea>
          </div>
          <div class="row">
            <label>知识类型</label>
            <select id="paste-knowledge-type">
              <option value="auto">auto(自动识别)</option>
              <option value="factual">factual</option>
              <option value="narrative">narrative</option>
              <option value="structured">structured</option>
              <option value="mixed">mixed</option>
            </select>
          </div>
          <div class="row">
            <button class="btn-primary" onclick="createPasteTask()">创建任务</button>
          </div>
        </div>

        <h2>原始目录扫描导入</h2>
        <div class="card">
          <div class="row">
            <label>alias</label>
            <select id="scan-alias">
              <option value="raw">raw</option>
              <option value="plugin_data">plugin_data</option>
            </select>
          </div>
          <div class="row">
            <label>relative</label>
            <input id="scan-relative" value="" placeholder="相对路径，如 subdir" />
          </div>
          <div class="row">
            <label>glob</label>
            <input id="scan-glob" value="*" />
          </div>
          <div class="row">
            <label>recursive</label>
            <select id="scan-recursive">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>
          <div class="row">
            <label>知识类型</label>
            <select id="scan-knowledge-type">
              <option value="auto">auto(自动识别)</option>
              <option value="factual">factual</option>
              <option value="narrative">narrative</option>
              <option value="structured">structured</option>
              <option value="mixed">mixed</option>
            </select>
          </div>
          <div class="row">
            <button class="btn-secondary" onclick="resolveScanPath()">解析路径</button>
            <button class="btn-primary" onclick="createRawScanTask()">创建任务</button>
          </div>
          <div id="scan-resolve-output" class="muted mono"></div>
        </div>
      </div>

      <div class="panel">
        <h2>任务面板</h2>
        <div class="row">
          <button class="btn-secondary" onclick="loadTasks()">刷新任务</button>
          <button class="btn-secondary" onclick="toggleAutoRefresh()" id="auto-refresh-btn">自动刷新: 开</button>
        </div>
        <div id="notice" class="muted"></div>

        <div class="task-list" id="task-list"></div>

        <h2 style="margin-top: 12px">任务详情</h2>
        <div id="task-detail" class="muted">请选择任务</div>

        <div class="row" style="margin-top: 10px">
          <button class="btn-danger" onclick="cancelSelectedTask()">取消任务</button>
          <button class="btn-secondary" onclick="retrySelectedTask()">重试失败项</button>
        </div>

        <div class="grid2" style="margin-top: 12px">
          <div class="card">
            <h2>文件状态</h2>
            <div id="files-table-wrap" class="muted">暂无数据</div>
          </div>
          <div class="card">
            <h2>分块状态（选中文件）</h2>
            <div id="chunks-table-wrap" class="muted">暂无数据</div>
          </div>
        </div>
      </div>
    </div>

    <div id="guide-modal" class="guide-modal" onclick="closeImportGuide(event)">
      <div class="guide-panel" onclick="event.stopPropagation()">
        <div class="guide-head">
          <h3>导入指南</h3>
          <button class="btn-secondary" onclick="closeImportGuide()">关闭</button>
        </div>
        <pre id="guide-content" class="guide-content">加载中...</pre>
      </div>
    </div>

    <script>
      let selectedTaskId = "";
      let selectedFileId = "";
      let autoRefresh = true;
      let autoTimer = null;
      let guideLoaded = false;

      function getToken() {
        return localStorage.getItem("amemorix_import_token") || "";
      }

      function saveToken() {
        const token = document.getElementById("token-input").value.trim();
        localStorage.setItem("amemorix_import_token", token);
        notice("token 已保存");
      }

      function clearToken() {
        localStorage.removeItem("amemorix_import_token");
        document.getElementById("token-input").value = "";
        notice("token 已清除");
      }

      async function apiFetch(url, options = {}) {
        const headers = { ...(options.headers || {}) };
        const token = getToken();
        if (token) headers.Authorization = `Bearer ${token}`;
        const res = await fetch(url, { ...options, headers });
        const text = await res.text();
        let data = {};
        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          data = { raw: text };
        }
        if (!res.ok) {
          const msg = data.detail || data.error || data.raw || `${res.status}`;
          throw new Error(msg);
        }
        return data;
      }

      function notice(msg) {
        document.getElementById("notice").textContent = msg || "";
      }

      async function openImportGuide() {
        const modal = document.getElementById("guide-modal");
        const content = document.getElementById("guide-content");
        modal.classList.add("show");
        if (guideLoaded) return;
        content.textContent = "加载中...";
        try {
          const data = await apiFetch("/v1/import/guide");
          content.textContent = data.content || "暂无导入指南内容";
          guideLoaded = true;
        } catch (err) {
          content.textContent = `加载失败: ${err.message}`;
        }
      }

      function closeImportGuide(evt) {
        if (evt && evt.target && evt.target.id !== "guide-modal") {
          return;
        }
        document.getElementById("guide-modal").classList.remove("show");
      }

      function statusClass(status) {
        if (["completed", "succeeded"].includes(status)) return "status-ok";
        if (["failed", "completed_with_errors", "cancelled"].includes(status)) return "status-bad";
        return "";
      }

      function selectedKnowledgeType(selectId) {
        const value = (document.getElementById(selectId)?.value || "auto").trim().toLowerCase();
        return value || "auto";
      }

      function triggerUploadFiles() {
        document.getElementById("upload-files").click();
      }

      function updateUploadFilesLabel() {
        const filesInput = document.getElementById("upload-files");
        const label = document.getElementById("upload-files-label");
        const list = filesInput?.files ? Array.from(filesInput.files) : [];
        if (!list.length) {
          label.textContent = "未选择文件";
          return;
        }
        if (list.length === 1) {
          label.textContent = list[0].name;
          return;
        }
        label.textContent = `已选择 ${list.length} 个文件`;
      }

      async function createUploadTask() {
        try {
          const filesInput = document.getElementById("upload-files");
          const mode = document.getElementById("upload-mode").value;
          if (!filesInput.files || filesInput.files.length === 0) {
            notice("请先选择文件");
            return;
          }
          const form = new FormData();
          for (const f of filesInput.files) form.append("files", f);
          form.append(
            "payload",
            JSON.stringify({
              input_mode: mode,
              knowledge_type: selectedKnowledgeType("upload-knowledge-type"),
            })
          );
          const data = await apiFetch("/v1/import/tasks/upload", { method: "POST", body: form });
          notice(`上传任务已创建: ${data.task.task_id}`);
          await loadTasks();
        } catch (err) {
          notice(`创建上传任务失败: ${err.message}`);
        }
      }

      async function createPasteTask() {
        try {
          const body = {
            name: document.getElementById("paste-name").value.trim(),
            content: document.getElementById("paste-content").value,
            knowledge_type: selectedKnowledgeType("paste-knowledge-type"),
          };
          const data = await apiFetch("/v1/import/tasks/paste", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          notice(`粘贴任务已创建: ${data.task.task_id}`);
          await loadTasks();
        } catch (err) {
          notice(`创建粘贴任务失败: ${err.message}`);
        }
      }

      async function resolveScanPath() {
        try {
          const body = {
            alias: document.getElementById("scan-alias").value,
            relative_path: document.getElementById("scan-relative").value.trim(),
            must_exist: true,
          };
          const data = await apiFetch("/v1/import/path_resolve", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          document.getElementById("scan-resolve-output").textContent =
            `${data.resolved_path} (dir=${data.is_dir}, file=${data.is_file})`;
        } catch (err) {
          document.getElementById("scan-resolve-output").textContent = `解析失败: ${err.message}`;
        }
      }

      async function createRawScanTask() {
        try {
          const body = {
            alias: document.getElementById("scan-alias").value,
            relative_path: document.getElementById("scan-relative").value.trim(),
            glob: document.getElementById("scan-glob").value.trim() || "*",
            recursive: document.getElementById("scan-recursive").value === "true",
            knowledge_type: selectedKnowledgeType("scan-knowledge-type"),
          };
          const data = await apiFetch("/v1/import/tasks/raw_scan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          notice(`扫描任务已创建: ${data.task.task_id}`);
          await loadTasks();
        } catch (err) {
          notice(`创建扫描任务失败: ${err.message}`);
        }
      }

      async function loadTasks() {
        try {
          const data = await apiFetch("/v1/import/tasks?limit=100");
          renderTaskList(data.items || []);
          if (selectedTaskId) await loadTaskDetail(selectedTaskId);
        } catch (err) {
          notice(`加载任务失败: ${err.message}`);
        }
      }

      function renderTaskList(items) {
        const container = document.getElementById("task-list");
        if (!items.length) {
          container.innerHTML = '<div class="task-item muted">暂无任务</div>';
          return;
        }
        container.innerHTML = items
          .map((item) => {
            const active = selectedTaskId === item.task_id ? "active" : "";
            return `<div class="task-item ${active}" onclick="selectTask('${item.task_id}')">
              <div class="mono">${item.task_id}</div>
              <div class="${statusClass(item.status)}">${item.status}</div>
              <div class="muted">progress=${Math.round((item.progress || 0) * 100)}%, files=${item.file_count}</div>
            </div>`;
          })
          .join("");
      }

      async function selectTask(taskId) {
        selectedTaskId = taskId;
        selectedFileId = "";
        await loadTaskDetail(taskId);
        await loadTasks();
      }

      async function loadTaskDetail(taskId) {
        try {
          const data = await apiFetch(`/v1/import/tasks/${taskId}?include_chunks=true`);
          const task = data.task || data;
          renderTaskDetail(task);
          renderFiles(task.files || []);
          if (selectedFileId) renderChunks((task.files || []).find((f) => f.file_id === selectedFileId)?.chunks || []);
        } catch (err) {
          notice(`加载任务详情失败: ${err.message}`);
        }
      }

      function renderTaskDetail(task) {
        const knowledgeType = task?.params?.knowledge_type || "auto";
        const el = document.getElementById("task-detail");
        el.innerHTML = `
          <div class="mono">task_id: ${task.task_id || "-"}</div>
          <div>status: <span class="${statusClass(task.status)}">${task.status || "-"}</span></div>
          <div>source: ${task.source || "-"}</div>
          <div>knowledge_type: ${knowledgeType}</div>
          <div>progress: ${Math.round(((task.progress || 0) * 100))}%</div>
          <div>error: ${task.error || "-"}</div>
        `;
      }

      function renderFiles(files) {
        const wrap = document.getElementById("files-table-wrap");
        if (!files.length) {
          wrap.innerHTML = '<div class="muted">暂无文件</div>';
          document.getElementById("chunks-table-wrap").innerHTML = '<div class="muted">暂无分块</div>';
          return;
        }
        wrap.innerHTML = `
          <table class="table">
            <thead><tr><th>file_id</th><th>name</th><th>status</th><th>chunks</th></tr></thead>
            <tbody>
              ${files
                .map(
                  (f) => `<tr onclick="selectFile('${f.file_id}')" style="cursor:pointer">
                    <td class="mono">${f.file_id.slice(0, 8)}...</td>
                    <td>${f.name}</td>
                    <td class="${statusClass(f.status)}">${f.status}</td>
                    <td>${f.done_chunks}/${f.total_chunks}</td>
                  </tr>`
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      async function selectFile(fileId) {
        selectedFileId = fileId;
        if (!selectedTaskId) return;
        try {
          const data = await apiFetch(`/v1/import/tasks/${selectedTaskId}/files/${fileId}/chunks?offset=0&limit=500`);
          renderChunks(data.items || []);
        } catch (err) {
          notice(`加载分块失败: ${err.message}`);
        }
      }

      function renderChunks(chunks) {
        const wrap = document.getElementById("chunks-table-wrap");
        if (!chunks.length) {
          wrap.innerHTML = '<div class="muted">暂无分块</div>';
          return;
        }
        wrap.innerHTML = `
          <table class="table">
            <thead><tr><th>idx</th><th>type</th><th>status</th><th>retryable</th></tr></thead>
            <tbody>
              ${chunks
                .map(
                  (c) => `<tr>
                    <td>${c.index}</td>
                    <td>${c.chunk_type}</td>
                    <td class="${statusClass(c.status)}">${c.status}</td>
                    <td>${c.retryable ? "true" : "false"}</td>
                  </tr>`
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      async function cancelSelectedTask() {
        if (!selectedTaskId) {
          notice("请先选择任务");
          return;
        }
        try {
          await apiFetch(`/v1/import/tasks/${selectedTaskId}/cancel`, { method: "POST" });
          notice("任务取消请求已提交");
          await loadTaskDetail(selectedTaskId);
          await loadTasks();
        } catch (err) {
          notice(`取消失败: ${err.message}`);
        }
      }

      async function retrySelectedTask() {
        if (!selectedTaskId) {
          notice("请先选择任务");
          return;
        }
        try {
          const data = await apiFetch(`/v1/import/tasks/${selectedTaskId}/retry_failed`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: "{}",
          });
          notice(`重试任务已创建: ${data.task.task_id}`);
          await loadTasks();
        } catch (err) {
          notice(`重试失败: ${err.message}`);
        }
      }

      function toggleAutoRefresh() {
        autoRefresh = !autoRefresh;
        document.getElementById("auto-refresh-btn").textContent = `自动刷新: ${autoRefresh ? "开" : "关"}`;
        if (autoRefresh) startAutoRefresh();
        else stopAutoRefresh();
      }

      function startAutoRefresh() {
        stopAutoRefresh();
        autoTimer = setInterval(() => {
          loadTasks().catch(() => {});
        }, 3000);
      }

      function stopAutoRefresh() {
        if (autoTimer) clearInterval(autoTimer);
        autoTimer = null;
      }

      function bootstrap() {
        document.getElementById("token-input").value = getToken();
        updateUploadFilesLabel();
        loadTasks();
        startAutoRefresh();
      }

      bootstrap();
    </script>
  </body>
</html>
